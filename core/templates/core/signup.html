<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShowUp2Move</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">ShowUp<span class="text-blue-600">2</span>Move</h1>
            <p class="text-gray-500 mt-2">Create an account and get on the court.</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {% for field in form %}
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <p class="text-xs text-gray-500 mt-1">{{ field.help_text|safe }}</p>
                    {% endif %}
                    {% for error in field.errors %}
                        <p class="text-xs text-red-600 mt-1 font-bold">{{ error }}</p>
                    {% endfor %}
                </div>
            {% endfor %}
            
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md transition mt-6">
                Create Account
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            Already have an account? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Log in</a>
        </div>
    </div>
    
    <style>
        input[type="text"], input[type="password"] {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.5rem 1rem;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            box-shadow: 0 0 0 2px #3b82f6;
        }
    </style>
</body>
</html>
