{% extends 'core/base.html' %}

{% block content %}

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-6">
        <div class="mb-6 text-center">
            <h1 class="text-2xl font-extrabold text-gray-900">Create a Match</h1>
            <p class="text-gray-500 text-sm mt-1">Bypass the queue and start organizing immediately.</p>
        </div>
{% if error %}
            <div class="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded-lg text-sm font-bold text-center">
                {{ error }}
            </div>
        {% endif %}
        <form method="POST" action="{% url 'create_manual_event' %}" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Select Sport</label>
                <select name="sport" required class="w-full border border-gray-300 rounded-lg px-4 py-2 bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="" disabled selected>Choose a sport...</option>
                    {% for sport in sports %}
                        <option value="{{ sport.id }}">{{ sport.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Date</label>
                <input type="date" name="date" required class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
            </div>

            <div class="pt-4 flex space-x-3">
                <a href="{% url 'dashboard' %}" class="w-1/3 text-center bg-gray-200 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-300 transition">Cancel</a>
                <button type="submit" class="w-2/3 bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 shadow-md transition">Create Match</button>
            </div>
        </form>
    </div>

{% endblock %}
