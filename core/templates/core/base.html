<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShowUp2Move</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-900">

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-xl font-extrabold tracking-tight hover:opacity-80 transition">
                ShowUp<span class="text-blue-600">2</span>Move
            </a>
            
            <div class="flex items-center space-x-4 text-sm font-bold text-gray-600">
                <a href="{% url 'dashboard' %}" class="hover:text-blue-600 transition">Dashboard</a>
                <span class="text-gray-300">|</span>
                <div class="flex items-center space-x-2">
                    <a href="{% url 'profile' %}" class="flex items-center space-x-2 hover:opacity-80 transition cursor-pointer">
    <div class="w-8 h-8 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center font-extrabold">
        {{ request.user.username|make_list|first|upper }}
    </div>
    
    <span class="hidden sm:inline text-gray-800 font-bold hover:text-blue-600 transition">{{ request.user.username }}</span>
</a>
<span class="text-gray-300 ml-4">|</span>
<form method="POST" action="{% url 'logout' %}" class="inline ml-4">
    {% csrf_token %}
    <button type="submit" class="text-sm font-bold text-gray-500 hover:text-red-600 transition">Logout</button>
</form>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1 w-full max-w-4xl mx-auto p-4 mt-4 flex justify-center items-start">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
